<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=480, initial-scale=1.0, user-scalable=no">
 <title>狗狗 MBTI-12 性格测试 v1.1.5</title>
 <style>
 :root {
 --primary: #FF9F1C;
 --bg: #FDFBF7;
 --card-bg: #FFFFFF;
 --text-main: #333333;
 --text-sub: #666666;
 --btn-hover: #FFF3E0;
 }
 * { -webkit-tap-highlight-color: transparent; }
 body {
 font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
 background-color: var(--bg);
 color: var(--text-main);
 margin: 0;
 padding: 0;
 display: flex;
 justify-content: center;
 min-height: 100vh;
 }
 #app {
 background-color: var(--card-bg);
 width: 100%;
 max-width: 480px;
 min-height: 100vh;
 box-shadow: 0 4px 20px rgba(0,0,0,0.05);
 display: flex;
 flex-direction: column;
 position: relative;
 }
 @media (min-width: 480px) {
 #app {
 min-height: auto;
 border-radius: 16px;
 margin: 20px;
 }
 }
 .container {
 padding: 30px 24px;
 flex-grow: 1;
 display: flex;
 flex-direction: column;
 justify-content: center;
 align-items: center;
 text-align: center;
 }
 .hidden { display: none !important; }
 
 .progress-bar {
 width: 100%;
 height: 6px;
 background-color: #EEEEEE;
 position: absolute;
 top: 0;
 left: 0;
 }
 .progress-fill {
 height: 100%;
 background-color: var(--primary);
 width: 0%;
 transition: width 0.3s ease;
 }

 h1 { font-size: 24px; margin-bottom: 12px; }
 p.subtitle { color: var(--text-sub); font-size: 14px; margin-bottom: 30px; line-height: 1.6; }
 
 .question-text {
 font-size: 20px;
 font-weight: bold;
 margin-bottom: 30px;
 line-height: 1.5;
 text-align: left;
 width: 100%;
 }
 .options { width: 100%; display: flex; flex-direction: column; gap: 12px; }
 .option-btn {
 background-color: #F8F9FA;
 border: 2px solid transparent;
 border-radius: 12px;
 padding: 16px;
 font-size: 16px;
 color: var(--text-main);
 cursor: pointer;
 transition: all 0.2s ease;
 text-align: left;
 -webkit-appearance: none;
 }
 .option-btn:hover, .option-btn:active {
 background-color: var(--btn-hover);
 border-color: var(--primary);
 color: var(--primary);
 font-weight: bold;
 }

 .primary-btn {
 background-color: var(--primary);
 color: white;
 border: none;
 border-radius: 24px;
 padding: 16px 40px;
 font-size: 18px;
 font-weight: bold;
 cursor: pointer;
 box-shadow: 0 4px 12px rgba(255, 159, 28, 0.3);
 transition: transform 0.2s;
 -webkit-appearance: none;
 }
 .primary-btn:active { transform: scale(0.98); }

 .result-type { font-size: 48px; color: var(--primary); font-weight: 900; margin: 10px 0; }
 .result-label { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
 .result-desc { font-size: 16px; color: var(--text-sub); line-height: 1.6; margin-bottom: 40px; background: #F8F9FA; padding: 20px; border-radius: 12px; }
 </style>
</head>

<body>

<div id="app">
 <div id="progress" class="progress-bar hidden">
 <div id="progress-fill" class="progress-fill"></div>
 </div>

 <div id="screen-start" class="container">
 <h1>🐶 狗狗 MBTI 性格测试</h1>
 <p class="subtitle">12道精简题目，测出你家毛孩子的隐藏人格。<br>请根据狗狗<strong>过去两周的典型行为</strong>作答。</p>
 <button id="start-btn" class="primary-btn">开始测试</button>
 </div>

 <div id="screen-quiz" class="container hidden">
 <div id="question-text" class="question-text">题目加载中...</div>
 <div class="options" id="options-container">
 <button class="option-btn" data-score="0">A. 从不</button>
 <button class="option-btn" data-score="1">B. 很少</button>
 <button class="option-btn" data-score="2">C. 有时</button>
 <button class="option-btn" data-score="3">D. 经常</button>
 <button class="option-btn" data-score="4">E. 总是</button>
 </div>
 </div>

 <div id="screen-result" class="container hidden">
 <p class="subtitle" style="margin-bottom: 0;">你的狗狗是：</p>
 <div id="result-type" class="result-type">ENTJ</div>
 <div id="result-label" class="result-label">社交领队犬</div>
 <div id="result-desc" class="result-desc">自信、主导、反应快，常成为"狗群核心"。</div>
 <button id="restart-btn" class="primary-btn">再测一次</button>
 </div>
</div>

<script>
(function() {
 // 题目配置
 const questions = [
 { id: 'S1', text: "1. 陌生人靠近或进门时，狗狗会主动靠近、嗅闻或求关注", isReverse: false },
 { id: 'S2_R', text: "2. 陌生人试图抚摸或靠近时，狗狗会明显回避或躲开", isReverse: true },
 { id: 'E1', text: "3. 听到\"出门/散步/玩\"信号时，狗狗会立刻兴奋起来", isReverse: false },
 { id: 'E2_R', text: "4. 大多数时间狗狗更偏向安静休息，对活动不太主动", isReverse: true },
 { id: 'C1', text: "5. 到新环境（新公园、朋友家）时，狗狗能较快放松并开始探索", isReverse: false },
 { id: 'C2_R', text: "6. 突然的巨响或陌生情况会让狗狗明显害怕、退缩或躲藏", isReverse: true },
 { id: 'R1', text: "7. 门铃、脚步声、突然动静出现时，狗狗会立刻吠叫或冲过去", isReverse: false },
 { id: 'R2_R', text: "8. 即使有噪声或刺激，狗狗大多能保持冷静", isReverse: true },
 { id: 'T1', text: "9. 你发出简单指令（坐下、过来）时，狗狗通常能快速响应", isReverse: false },
 { id: 'T2_R', text: "10. 训练中狗狗容易分心，很难持续专注", isReverse: true },
 { id: 'Q1', text: "11. 散步或在家时，狗狗会主动探索新气味、新物品或新角落", isReverse: false },
 { id: 'Q2_R', text: "12. 面对新东西，狗狗往往兴趣不大或很快放弃", isReverse: true }
 ];

 const resultDict = {
 "ENTJ": { label: "社交领队犬", desc: "自信、主导、反应快，常成为\"狗群核心\"。" },
 "ENTP": { label: "快乐冒险犬", desc: "精力充沛、好奇心强，喜欢变化和新刺激。" },
 "ESTJ": { label: "乖模特范犬", desc: "规则感强、听指令、稳定可靠，非常好训练。" },
 "ESFJ": { label: "亲和陪伴犬", desc: "亲人、情绪稳定、喜欢互动，典型家庭犬。" },
 "ENFP": { label: "热情探索犬", desc: "外向又感性，情绪表达强，黏人但爱玩。" },
 "ESFP": { label: "开心果犬", desc: "活在当下，爱玩爱闹，行动先于思考。" },
 "INTJ": { label: "冷静规划犬", desc: "独立、观察力强，习惯先判断再行动。" },
 "INTP": { label: "研究型观察犬", desc: "不黏人但好奇，常自己\"研究世界\"。" },
 "ISTJ": { label: "安全守序犬", desc: "稳定、依赖熟悉环境，非常忠诚。" },
 "ISFJ": { label: "温柔照看犬", desc: "安静、情绪细腻，对主人依恋度高。" },
 "INFJ": { label: "敏感洞察犬", desc: "慢热、感知力强，对环境变化非常敏感。" },
 "INFP": { label: "温柔理想犬", desc: "情绪丰富、需要安全感，依恋关系深。" }
 };

 let currentIndex = 0;
 let answers = {};

 function switchScreen(hideId, showId) {
 document.getElementById(hideId).classList.add('hidden');
 document.getElementById(showId).classList.remove('hidden');
 }

 function startQuiz() {
 switchScreen('screen-start', 'screen-quiz');
 document.getElementById('progress').classList.remove('hidden');
 renderQuestion();
 }

 function renderQuestion() {
 var q = questions[currentIndex];
 document.getElementById('question-text').innerText = q.text;
 var progress = (currentIndex / questions.length) * 100;
 document.getElementById('progress-fill').style.width = progress + '%';
 }

 function selectOption(rawScore) {
 var q = questions[currentIndex];
 answers[q.id] = rawScore;
 
 if (currentIndex < questions.length - 1) {
 currentIndex++;
 renderQuestion();
 } else {
 document.getElementById('progress-fill').style.width = '100%';
 calculateResult();
 }
 }

 function calculateResult() {
 // 维度计算：原始分 + 反向转换分
 var S = answers['S1'] + (4 - answers['S2_R']);
 var E = answers['E1'] + (4 - answers['E2_R']);
 var C = answers['C1'] + (4 - answers['C2_R']);
 var R = answers['R1'] + (4 - answers['R2_R']);
 var T = answers['T1'] + (4 - answers['T2_R']);
 var Q = answers['Q1'] + (4 - answers['Q2_R']);

 // 优化阈值：科学分布
 var EI = (S + E) >= 8 ? "E" : "I";
 var NS = Q >= 4 ? "N" : "S";
 var JP = (C + R + T) >= 12 ? "J" : "P";
 var baseType = EI + NS + JP;

 // 12类型映射
 var finalType = "";
 switch (baseType) {
 case "ENJ": finalType = "ENTJ"; break;
 case "ESP": finalType = "ESFP"; break;
 case "ENP": finalType = (S >= 4) ? "ENFP" : "ENTP"; break;
 case "ESJ": finalType = (T >= S) ? "ESTJ" : "ESFJ"; break;
 case "INJ": finalType = (C <= 4) ? "INFJ" : "INTJ"; break;
 case "INP": finalType = (S >= 4) ? "INFP" : "INTP"; break;
 case "ISJ": finalType = (S >= 4) ? "ISFJ" : "ISTJ"; break;
 case "ISP": finalType = "ISFJ"; break;
 default: finalType = "ESFJ";
 }

 showResult(finalType);
 }

 function showResult(type) {
 setTimeout(function() {
 switchScreen('screen-quiz', 'screen-result');
 document.getElementById('progress').classList.add('hidden');
 
 var resultData = resultDict[type];
 document.getElementById('result-type').innerText = type;
 document.getElementById('result-label').innerText = resultData.label;
 document.getElementById('result-desc').innerText = resultData.desc;
 }, 200);
 }

 // 绑定事件
 document.getElementById('start-btn').addEventListener('click', startQuiz);
 document.getElementById('restart-btn').addEventListener('click', function() {
 location.reload();
 });

 var options = document.querySelectorAll('.option-btn');
 for (var i = 0; i < options.length; i++) {
 options[i].addEventListener('click', function() {
 var score = parseInt(this.getAttribute('data-score'), 10);
 selectOption(score);
 });
 }
})();
</script>

</body>
</html>
